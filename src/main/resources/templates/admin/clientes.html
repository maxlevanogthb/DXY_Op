<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::content}, ~{::scripts})}">
<head>
</head>
<body>

<div th:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">
            <i class="fas fa-user-plus me-2"></i>Gestión de Clientes Potenciales
        </h2>
        <button class="btn btn-success shadow-sm" onclick="abrirModalNuevo()">
            <i class="fas fa-plus-circle me-2"></i>Nuevo Cliente
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3 bg-light rounded">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="buscarCliente" class="form-control border-start-0 ps-0"
                            placeholder="Buscar por nombre, teléfono o motivo..." />
                    </div>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-outline-secondary w-100" onclick="dataTable.ajax.reload()">
                        <i class="fas fa-sync-alt me-1"></i> Actualizar Lista
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm border rounded-3 bg-white">
        <table id="tablaClientes" class="table table-hover align-middle mb-0" style="width:100%">
            <thead class="bg-light">
                <tr>
                    <th class="text-center text-muted small py-3">ID</th>
                    <th class="py-3">Nombre</th>
                    <th class="py-3">Teléfono</th>
                    <th class="py-3">Email</th>
                    <th class="py-3">Motivo</th>
                    <th class="py-3">Estado</th>
                    <th class="py-3">Fecha de Registro</th>
                    <th class="text-center py-3">Acciones</th>
                </tr>
            </thead>
            <tbody class="border-top-0">
                </tbody>
        </table>
    </div>

    <div class="modal fade" id="clienteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitulo">
                        <i class="fas fa-user-edit me-2"></i>Nuevo Cliente Potencial
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formCliente">
                        <input type="hidden" id="clienteId">
                        
                        <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">1. INFORMACIÓN DE CONTACTO</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12">
                                <label for="nombre" class="form-label fw-bold small">Nombre Completo *</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Juan Pérez" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label fw-bold small">Teléfono *</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-phone text-muted"></i></span>
                                    <input type="tel" class="form-control" id="telefono" placeholder="Ej. 5512345678" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold small">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="cliente@email.com">
                                </div>
                            </div>
                        </div>

                        <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">2. DETALLES DEL REGISTRO</h6>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="motivo" class="form-label fw-bold small">Motivo Visita *</label>
                                <select class="form-select" id="motivo" required>
                                    <option value="" disabled selected>Cargando motivos...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="fecha" class="form-label fw-bold small">Fecha Registro</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-calendar-day text-muted"></i></span>
                                    <input type="date" class="form-control" id="fecha" required>
                                </div>
                            </div>
                            
                            <div class="col-md-12">
                                <label for="estado" class="form-label fw-bold small">Estado del Lead</label>
                                <select class="form-select" id="estado">
                                    <option value="PENDIENTE">Pendiente por contactar</option>
                                    <option value="CONTACTADO">Ya contactado</option>
                                    <option value="ATENDIDO">Atendido (Convertido)</option>
                                    <option value="DESCARTADO">Descartado</option>
                                </select>
                            </div>
                            
                            <div class="col-12">
                                <label for="mensaje" class="form-label fw-bold small">Observaciones / Mensaje</label>
                                <textarea class="form-control" id="mensaje" rows="2" placeholder="Notas adicionales o comentarios del cliente..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="guardarCliente()">
                        <i class="fas fa-save me-2"></i>Guardar Cliente
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="scripts">
    <script src="/js/admin-clientes.js"></script>
</div>

</body>
</html>
