<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content, scripts)" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appConfig.nombreComercial != null ? appConfig.nombreComercial + ' | Panel Admin' : 'Óptica DXY | Panel Admin'}">Óptica DXY | Panel Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">

    <script>
        (function() {
            // Leemos la memoria del navegador
            const temaColor = localStorage.getItem('dxy_color') || '#0d6efd';
            const modoOscuro = localStorage.getItem('dxy_dark') === 'true';

            // MODO OSCURO NATIVO DE BOOTSTRAP 5
            if (modoOscuro) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            }

            // INYECCIÓN DE COLOR PERSONALIZADO (White-Labeling)
            if (temaColor !== '#0d6efd') {
                const style = document.createElement('style');
                style.innerHTML = `
                    /* Variables raíz de Bootstrap */
                    :root { 
                        --bs-primary: ${temaColor}; 
                        --bs-primary-rgb: ${hexToRgb(temaColor)};
                    }
                    /* Forzando clases utilitarias clave */
                    .bg-primary { background-color: ${temaColor} !important; }
                    .text-primary { color: ${temaColor} !important; }
                    .border-primary { border-color: ${temaColor} !important; }
                    
                    /* Botones re-estilizados */
                    .btn-primary { 
                        background-color: ${temaColor} !important; 
                        border-color: ${temaColor} !important; 
                        color: #fff !important; 
                    }
                    .btn-primary:hover { filter: brightness(0.85); }
                    .btn-outline-primary { color: ${temaColor} !important; border-color: ${temaColor} !important; }
                    .btn-outline-primary:hover { background-color: ${temaColor} !important; color: #fff !important; }
                    
                    /* Fix para botones de DataTables y elementos sutiles */
                    .page-item.active .page-link { background-color: ${temaColor} !important; border-color: ${temaColor} !important; }
                    .bg-primary.bg-opacity-10 { background-color: rgba(var(--bs-primary-rgb), 0.1) !important; }
                `;
                document.head.appendChild(style);
            }

            // Utilidad para convertir Hex a RGB (necesario para las opacidades)
            function hexToRgb(hex) {
                let r = parseInt(hex.slice(1, 3), 16);
                let g = parseInt(hex.slice(3, 5), 16);
                let b = parseInt(hex.slice(5, 7), 16);
                return `${r}, ${g}, ${b}`;
            }
        })();
    </script>
</head>
<body>

<div class="d-flex" id="wrapper">
    <div class="border-end" id="sidebar-wrapper">
        <div class="sidebar-heading border-bottom text-center py-3">
            <img th:if="${appConfig.logoSistema != null}" th:src="${appConfig.logoSistema}" alt="Logo" style="max-height: 40px; max-width: 100%;" class="mb-2 rounded">
            <i th:unless="${appConfig.logoSistema != null}" class="fas fa-glasses fs-3 mb-2 text-primary"></i>
            <br>
            <span class="fw-bold" th:text="${appConfig.nombreComercial != null ? appConfig.nombreComercial : 'Óptica DXY'}">Óptica DXY</span>
        </div>
        
        <div class="list-group list-group-flush mt-2">
            <a href="/admin/dashboard" class="list-group-item list-group-item-action">
                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
            </a>
            <a href="/admin/potenciales" class="list-group-item list-group-item-action">
                <i class="fas fa-user-plus me-2"></i> Clientes Potenciales
            </a>
            <a href="/admin/pacientes" class="list-group-item list-group-item-action">
                <i class="fas fa-user-check me-2"></i> Pacientes
            </a>
            <a href="/admin/productos" class="list-group-item list-group-item-action">
                 <i class="fas fa-boxes-stacked me-2"></i> Productos 
            </a>
            <a href="/admin/ventas" class="list-group-item list-group-item-action">
                <i class="fas fa-chart-line me-2"></i> Ventas
            </a>
            <a href="/admin/citas" class="list-group-item list-group-item-action">
                <i class="fas fa-calendar-check me-2"></i> Citas
            </a>
            <a href="/admin/configuracion" class="list-group-item list-group-item-action">
                <i class="fas fa-cog me-2"></i> Configuración
            </a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-custom border-bottom px-3 bg-white shadow-sm">
            <button class="btn btn-outline-primary btn-sm" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="ms-auto d-flex align-items-center">
                <i class="fas fa-user-circle text-muted fs-5 me-2"></i>
                <span class="me-3 text-muted small fw-bold" sec:authentication="name">Usuario</span>
                
                <a class="btn btn-outline-danger btn-sm" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </nav>

        <div class="container-fluid px-4 py-4">
            <div th:replace="${content}"></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
        (function() {
            const temaColor = localStorage.getItem('dxy_color') || '#0d6efd';
            const modoOscuro = localStorage.getItem('dxy_dark') === 'true';

            if (modoOscuro) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            }

            function hexToRgb(hex) {
                let r = parseInt(hex.slice(1, 3), 16);
                let g = parseInt(hex.slice(3, 5), 16);
                let b = parseInt(hex.slice(5, 7), 16);
                return `${r}, ${g}, ${b}`;
            }

            const rgbTema = hexToRgb(temaColor);
            const style = document.createElement('style');
            
            // ==========================================
            // 1. INYECCIÓN DEL TEMA (MARCA BLANCA)
            // ==========================================
            let css = `
                :root {
                    --bs-primary: ${temaColor};
                    --bs-primary-rgb: ${rgbTema};
                }
                
                /* ⭐ FORZAR LA BARRA LATERAL (Venciendo a admin.css) ⭐ */
                body #wrapper #sidebar-wrapper { background-color: var(--bs-primary) !important; border-right-color: rgba(255,255,255,0.1) !important; }
                body #wrapper #sidebar-wrapper * { color: #ffffff !important; }
                body #wrapper #sidebar-wrapper .list-group-item { background: transparent !important; border-color: rgba(255,255,255,0.05) !important; }
                body #wrapper #sidebar-wrapper .list-group-item:hover, 
                body #wrapper #sidebar-wrapper .list-group-item.active { background: rgba(255,255,255,0.2) !important; font-weight: bold; }
                body #wrapper #sidebar-wrapper .sidebar-heading { border-bottom: 1px solid rgba(255,255,255,0.1) !important; }

                /* Utilidades principales */
                .bg-primary { background-color: var(--bs-primary) !important; }
                .text-primary { color: var(--bs-primary) !important; }
                .border-primary { border-color: var(--bs-primary) !important; }
                .btn-primary { background-color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; color: #fff !important; }
                .btn-primary:hover { filter: brightness(0.85); }
                .btn-outline-primary { color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; }
                .btn-outline-primary:hover { background-color: var(--bs-primary) !important; color: #fff !important; }
                
                /* Paginación de DataTables */
                .page-item.active .page-link { background-color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; }
                .bg-primary.bg-opacity-10 { background-color: rgba(var(--bs-primary-rgb), 0.1) !important; }
            `;

            // ==========================================
            // 2. PARCHE PROFESIONAL: MODO OSCURO
            // ==========================================
            if (modoOscuro) {
                css += `
                    /* ⭐ HACK MAESTRO: Alterar las variables base de Bootstrap ⭐ */
                    /* Hacemos que Bootstrap crea que el color "Blanco" ahora es "Gris Oscuro" */
                    [data-bs-theme="dark"] {
                        --bs-body-bg: #121212;
                        --bs-body-color: #e0e0e0;
                        --bs-white-rgb: 30, 30, 30; /* Convierte bg-white en gris oscuro elegante (#1e1e1e) */
                        --bs-light-rgb: 43, 43, 43; /* Convierte bg-light en gris medio (#2b2b2b) */
                        --bs-dark-rgb: 240, 240, 240; /* Invierte text-dark a blanco */
                        --bs-border-color: #333333;
                    }

                    /* Refuerzo para contenedores rebeldes */
                    [data-bs-theme="dark"] body { background-color: #121212 !important; }
                    [data-bs-theme="dark"] .bg-white, [data-bs-theme="dark"] .bg-light { background-color: #1e1e1e !important; color: #e0e0e0 !important; border-color: #333 !important;}
                    
                    /* Tarjetas y Modales */
                    [data-bs-theme="dark"] .card, [data-bs-theme="dark"] .modal-content { background-color: #1e1e1e !important; border-color: #333 !important; }
                    [data-bs-theme="dark"] .card-header, [data-bs-theme="dark"] .modal-header { background-color: rgba(0,0,0,0.25) !important; border-bottom: 1px solid #333 !important; }
                    
                    /* Tablas DataTables */
                    [data-bs-theme="dark"] .table, [data-bs-theme="dark"] table.dataTable { color: #e0e0e0 !important; border-color: #444 !important; }
                    [data-bs-theme="dark"] .table-light th, [data-bs-theme="dark"] thead.bg-light th { background-color: #252525 !important; color: #fff !important; border-bottom: 1px solid #444 !important; }
                    [data-bs-theme="dark"] .table td { border-color: #333 !important; }
                    [data-bs-theme="dark"] .table-hover tbody tr:hover td { background-color: #2a2a2a !important; color: #fff !important; }
                    
                    /* Textos y Controles DataTables */
                    [data-bs-theme="dark"] .dataTables_wrapper label, 
                    [data-bs-theme="dark"] .dataTables_info,
                    [data-bs-theme="dark"] .dataTables_wrapper .dataTables_paginate .paginate_button { color: #adb5bd !important; }
                    
                    /* Formularios */
                    [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select, [data-bs-theme="dark"] .input-group-text { 
                        background-color: #2b2b2b !important; border-color: #444 !important; color: #fff !important; 
                    }
                    [data-bs-theme="dark"] .form-control:focus, [data-bs-theme="dark"] .form-select:focus {
                        background-color: #333 !important; color: #fff !important; border-color: var(--bs-primary) !important;
                    }
                    [data-bs-theme="dark"] .form-control:disabled, [data-bs-theme="dark"] .form-control[readonly], [data-bs-theme="dark"] .input-group-text.bg-light { 
                        background-color: #1a1a1a !important; 
                    }
                    
                    /* Navbar Superior */
                    [data-bs-theme="dark"] .navbar-custom { background-color: #1e1e1e !important; border-bottom: 1px solid #333 !important; }
                    [data-bs-theme="dark"] .navbar-custom .text-muted { color: #e0e0e0 !important; }
                    
                    /* ⭐ FullCalendar (Agenda) ⭐ */
                    [data-bs-theme="dark"] .fc { background-color: #1e1e1e !important; padding: 10px; border-radius: 8px; }
                    [data-bs-theme="dark"] .fc-theme-standard td, [data-bs-theme="dark"] .fc-theme-standard th { border-color: #444 !important; }
                    [data-bs-theme="dark"] .fc-col-header-cell-cushion, [data-bs-theme="dark"] .fc-daygrid-day-number { color: #e0e0e0 !important; text-decoration: none; }
                    [data-bs-theme="dark"] .fc .fc-button-primary { background-color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; }
                    [data-bs-theme="dark"] .fc .fc-day-today { background-color: rgba(var(--bs-primary-rgb), 0.15) !important; }
                `;
            }

            style.innerHTML = css;
            document.head.appendChild(style);
        })();
    </script>

<div th:replace="${scripts}"></div>

</body>
</html>
