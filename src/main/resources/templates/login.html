<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Óptica DXY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .login-header {
            background-color: #0056b3;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="login-header">
                        <img th:if="${appConfig.logoSistema != null}" th:src="${appConfig.logoSistema}" alt="Logo" style="max-height: 60px;" class="mb-3 rounded">
                        <i th:unless="${appConfig.logoSistema != null}" class="fas fa-glasses fa-3x mb-3"></i>
                        
                        <h4 class="fw-bold mb-0" th:text="${appConfig.nombreComercial != null ? appConfig.nombreComercial : 'Óptica DXY'}">Óptica DXY</h4>
                        <p class="small text-white-50 mb-0">Panel de Administración</p>
                    </div>
                    <div class="card-body p-4">
                        
                        <div th:if="${param.error}" class="alert alert-danger small text-center">
                            <i class="fas fa-exclamation-circle me-1"></i> Usuario o contraseña incorrectos.
                        </div>
                        
                        <div th:if="${param.logout}" class="alert alert-success small text-center">
                            <i class="fas fa-check-circle me-1"></i> Sesión cerrada correctamente.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label small fw-bold text-muted">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Ingrese su usuario" required autofocus>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold text-muted">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm py-2">
                                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
                            </button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
